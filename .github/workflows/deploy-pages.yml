name: Deploy Ghost Closet to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply storefront security and product corrections
        run: node scripts/harden-storefront.mjs

      - name: Retrieve storefront imagery
        run: bash scripts/download-storefront-assets.sh

      - name: Preserve storefront corrections and imagery
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/page.tsx app/globals.css public/products public/editorial
          if ! git diff --cached --quiet; then
            git commit -m "Harden Ghost Closet storefront"
            if ! git push origin HEAD:main; then
              echo "The deployment can continue even though generated storefront changes could not be pushed."
            fi
          fi

      - name: Build static storefront
        run: npm run build:pages
        env:
          PAGES_BASE_PATH: /GhostCloset---GC
          NEXT_PUBLIC_BASE_PATH: /GhostCloset---GC

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  status:
    if: always()
    runs-on: ubuntu-latest
    needs: [build, deploy]
    steps:
      - name: Check out latest repository state
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Record deployment result
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          RUN_ID: ${{ github.run_id }}
        run: |
          printf '# GitHub Pages deployment\n\nBuild: **%s**\n\nDeploy: **%s**\n\nRun ID: **%s**\n\nTarget: <https://ghostxlebanon.github.io/GhostCloset---GC/>\n' \
            "$BUILD_RESULT" "$DEPLOY_RESULT" "$RUN_ID" > DEPLOYMENT_STATUS.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add DEPLOYMENT_STATUS.md
          if ! git diff --cached --quiet; then
            git commit -m "Record GitHub Pages deployment status"
            git push origin HEAD:main
          fi
