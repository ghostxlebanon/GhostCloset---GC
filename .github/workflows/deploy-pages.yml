name: Deploy Ghost Closet to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Retrieve storefront imagery
        run: bash scripts/download-storefront-assets.sh

      - name: Preserve imagery in this repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/products public/editorial
          if ! git diff --cached --quiet; then
            git commit -m "Add Ghost Closet storefront imagery"
            if ! git push origin HEAD:main; then
              echo "The deployment can continue even though the image cache could not be pushed."
            fi
          fi

      - name: Enable GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build static storefront
        run: npm run build:pages
        env:
          PAGES_BASE_PATH: /GhostCloset---GC
          NEXT_PUBLIC_BASE_PATH: /GhostCloset---GC

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
