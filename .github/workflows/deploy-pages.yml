name: Deploy Ghost Closet to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      diagnostic: ${{ steps.prepare.outputs.diagnostic }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          package-manager-cache: false

      - name: Install locked dependencies
        run: npm ci --silent

      - name: Prepare verified HD product imagery
        id: prepare
        shell: bash
        run: |
          set +e
          OUTPUT=$(node scripts/one-image-per-product.mjs 2>&1)
          CODE=$?
          printf '%s\n' "$OUTPUT"
          DIAGNOSTIC=$(printf '%s\n' "$OUTPUT" | tail -n 1 | tr -cd '[:alnum:] ._:/=-' | cut -c1-72)
          echo "diagnostic=$DIAGNOSTIC" >> "$GITHUB_OUTPUT"
          exit "$CODE"

      - name: Build static storefront
        run: npm run build:pages
        env:
          PAGES_BASE_PATH: /GhostCloset---GC
          NEXT_PUBLIC_BASE_PATH: /GhostCloset---GC

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  status:
    if: always()
    runs-on: ubuntu-latest
    needs: [build, deploy]
    permissions:
      statuses: write
    steps:
      - name: Publish deployment verification
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          DIAGNOSTIC: ${{ needs.build.outputs.diagnostic }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$BUILD_RESULT" = "success" ] && [ "$DEPLOY_RESULT" = "success" ]; then
            STATE=success
            CONTEXT="ghost-closet/pages"
          else
            STATE=failure
            CONTEXT="ghost-closet/pages: ${DIAGNOSTIC:-unknown-error}"
          fi
          CONTEXT=$(printf '%s' "$CONTEXT" | cut -c1-100)
          DESCRIPTION="build=$BUILD_RESULT deploy=$DEPLOY_RESULT"

          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data "{\"state\":\"$STATE\",\"context\":\"$CONTEXT\",\"description\":\"$DESCRIPTION\",\"target_url\":\"$RUN_URL\"}"
